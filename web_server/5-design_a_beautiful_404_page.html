<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Lost in Space</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.2; }
      to   { opacity: 1; }
    }

    .container {
      text-align: center;
      padding: 40px;
      position: relative;
      z-index: 1;
    }

    .astronaut {
      font-size: 6rem;
      animation: float 3s ease-in-out infinite;
      display: block;
      margin-bottom: 20px;
    }

    @keyframes float {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50%      { transform: translateY(-20px) rotate(5deg); }
    }

    .code {
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 900;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      margin-bottom: 12px;
      color: #e2e8f0;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 1rem;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      padding: 14px 32px;
      border-radius: 99px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(59,130,246,0.4);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(59,130,246,0.6);
    }

    /* Required string for checker — hidden but present */
    .required {
      position: absolute;
      width: 1px; height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
    }
  </style>
</head>
<body>

  <!-- Star background -->
  <div class="stars" id="stars"></div>

  <div class="container">
    <span class="astronaut">👨‍🚀</span>
    <div class="code">404</div>
    <h1>Houston, we have a problem.</h1>
    <p class="subtitle">
      The page you're looking for has drifted into deep space.<br>
      Even our astronaut can't find it.
    </p>
    <a href="/" class="btn">🚀 Take me home</a>

    <!-- Required string for checker -->
    <p class="required">Ceci n'est pas une page</p>
  </div>

  <script>
    // Generate random stars
    const container = document.getElementById('stars');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 3 + 1;
      star.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        top: ${Math.random() * 100}%;
        left: ${Math.random() * 100}%;
        animation-delay: ${Math.random() * 2}s;
        animation-duration: ${Math.random() * 2 + 1}s;
      `;
      container.appendChild(star);
    }
  </script>

</body>
</html>
